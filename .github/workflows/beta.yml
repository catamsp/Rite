# Beta CI Pipeline for SwiftSlate
#
# Versioning scheme:
#   - Derives from the NEXT stable version (current latest tag patch + 1)
#   - Example: if latest stable is v1.0.7, beta versions are v1.0.8-beta.1, v1.0.8-beta.2, ...
#   - versionCode = (stable commit count * 100) + beta number, ensuring it's higher than
#     current stable but leaves room (the stable release uses raw commit count)
#   - Beta tags and releases are marked as pre-release and never affect the stable workflow

name: Build Beta APK

on:
  push:
    branches:
      - beta
    paths:
      - 'app/**'
      - 'build.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle/**'
      - 'gradle.properties'
      - '.github/workflows/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  ci:
    name: CI
    uses: ./.github/workflows/ci.yml
    secrets: inherit
    with:
      release_type: beta

  release:
    name: Pre-release
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download APK
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: SwiftSlate-${{ needs.ci.outputs.tag }}
          path: artifacts/

      - name: Create beta tag
        if: needs.ci.outputs.create_tag == 'true'
        run: |
          git tag "${{ needs.ci.outputs.tag }}"
          git push origin "${{ needs.ci.outputs.tag }}"

      - name: Pre-release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ needs.ci.outputs.tag }}
          files: artifacts/SwiftSlate-*.apk
          name: SwiftSlate ${{ needs.ci.outputs.tag }} (Beta)
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
