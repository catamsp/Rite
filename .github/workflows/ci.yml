# Reusable CI pipeline for SwiftSlate
# Called by build.yml (stable) and beta.yml (beta)

name: CI Pipeline

on:
  workflow_call:
    inputs:
      release_type:
        description: 'Release type: stable or beta'
        required: true
        type: string
    outputs:
      tag:
        description: 'Version tag'
        value: ${{ jobs.version.outputs.tag }}
      version_name:
        description: 'Version name'
        value: ${{ jobs.version.outputs.version_name }}
      version_code:
        description: 'Version code'
        value: ${{ jobs.version.outputs.version_code }}
      create_tag:
        description: 'Whether to create a new tag'
        value: ${{ jobs.version.outputs.create_tag }}

permissions:
  contents: read

jobs:
  version:
    name: Determine Version
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version_name: ${{ steps.version.outputs.version_name }}
      version_code: ${{ steps.version.outputs.version_code }}
      create_tag: ${{ steps.version.outputs.create_tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Determine version
        id: version
        run: |
          BASE_VERSION=$(grep 'val baseVersion' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/')

          if [[ "${{ inputs.release_type }}" == "stable" ]]; then
            if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
              TAG="${{ github.ref_name }}"
              CREATE_TAG=false
            else
              PATCH=$(git tag -l "v${BASE_VERSION}.*" | grep -v beta | sed "s/v${BASE_VERSION}\.//" | sort -n | tail -1)
              NEXT=$((${PATCH:--1} + 1))
              TAG="v${BASE_VERSION}.${NEXT}"
              CREATE_TAG=true
            fi
            VERSION_NAME="${TAG#v}"
            VERSION_CODE=$(git rev-list --count HEAD)
          else
            LATEST_PATCH=$(git tag -l "v${BASE_VERSION}.*" --sort=-v:refname | grep -v beta | head -1 | sed "s/v${BASE_VERSION}\.//" )
            NEXT_PATCH=$((${LATEST_PATCH:--1} + 1))
            NEXT_STABLE="${BASE_VERSION}.${NEXT_PATCH}"

            LATEST_BETA=$(git tag -l "v${NEXT_STABLE}-beta.*" --sort=-v:refname | head -1 | grep -oP 'beta\.\K[0-9]+' || true)
            BETA_NUM=$((${LATEST_BETA:-0} + 1))

            TAG="v${NEXT_STABLE}-beta.${BETA_NUM}"
            VERSION_NAME="${NEXT_STABLE}-beta.${BETA_NUM}"
            COMMIT_COUNT=$(git rev-list --count HEAD)
            VERSION_CODE=$(( COMMIT_COUNT * 100 + BETA_NUM ))
            CREATE_TAG=true
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version_name=$VERSION_NAME" >> "$GITHUB_OUTPUT"
          echo "version_code=$VERSION_CODE" >> "$GITHUB_OUTPUT"
          echo "create_tag=${CREATE_TAG:-true}" >> "$GITHUB_OUTPUT"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5
        with:
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_ENCRYPTION_KEY }}

      - name: Run lint
        run: ./gradlew lint --parallel --build-cache --configuration-cache-problems=warn
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx3g -XX:+UseG1GC"

      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: lint-results
          path: app/build/reports/lint-results-*.html
          retention-days: 14

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5
        with:
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_ENCRYPTION_KEY }}

      - name: Run unit tests
        run: ./gradlew test --parallel --build-cache --configuration-cache-problems=warn
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx3g -XX:+UseG1GC"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: test-results
          path: app/build/reports/tests/
          retention-days: 14

  build:
    name: Build Signed APK
    needs: [version, lint, test]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up JDK 21
        uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@0723195856401067f7a2779048b490ace7a47d7c # v5
        with:
          cache-encryption-key: ${{ secrets.GRADLE_CACHE_ENCRYPTION_KEY }}

      - name: Decode signing keystore
        run: echo "$KEYSTORE_BASE64" | base64 -d > ${{ github.workspace }}/release.keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build Release APK
        run: |
          ./gradlew assembleRelease --parallel --build-cache --configuration-cache-problems=warn --stacktrace \
            -PversionCode=${{ needs.version.outputs.version_code }} \
            -PversionName=${{ needs.version.outputs.version_name }}
        env:
          GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx3g -XX:+UseG1GC"
          KEYSTORE_FILE: ${{ github.workspace }}/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Cleanup keystore
        if: always()
        run: rm -f ${{ github.workspace }}/release.keystore

      - name: Verify APK exists and check size
        run: |
          APK_PATH="app/build/outputs/apk/release/app-release.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "::error::APK not found at $APK_PATH"
            exit 1
          fi
          SIZE=$(stat -c%s "$APK_PATH")
          echo "APK size: $((SIZE / 1024 / 1024))MB ($SIZE bytes)"
          if [ "$SIZE" -lt 100000 ]; then
            echo "::error::APK suspiciously small ($SIZE bytes)"
            exit 1
          fi

      - name: Verify APK signature
        run: |
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/*/ | sort -V | tail -1)
          ${BUILD_TOOLS}apksigner verify --print-certs app/build/outputs/apk/release/app-release.apk

      - name: Rename APK
        run: mv app/build/outputs/apk/release/app-release.apk app/build/outputs/apk/release/SwiftSlate-${{ needs.version.outputs.tag }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: SwiftSlate-${{ needs.version.outputs.tag }}
          path: app/build/outputs/apk/release/SwiftSlate-*.apk
          retention-days: 90
